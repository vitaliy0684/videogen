<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Статус генерации</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">🎬 Статус генерации</h1>
                    <p id="message" class="text-muted">⏳ Загружаю данные...</p>
                    <div class="progress mb-3" role="progressbar">
                        <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                             style="width: 0%">0%</div>
                    </div>
                    <div class="d-flex gap-2">
                        <a id="downloadBtn" class="btn btn-success d-none" href="#">📥 Скачать видео</a>
                        <a class="btn btn-outline-primary" href="/">Новое видео</a>
                    </div>
                    <div id="errorBox" class="alert alert-danger mt-3 d-none"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const taskId = "{{ task_id }}";
const statusUrl = `/api/status/${taskId}`;
const progressBar = document.getElementById("progressBar");
const message = document.getElementById("message");
const downloadBtn = document.getElementById("downloadBtn");
const errorBox = document.getElementById("errorBox");

async function refreshStatus() {
    try {
        const res = await fetch(statusUrl);
        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.message || "Ошибка получения статуса");
        }

        const progress = Number(data.progress || 0);
        progressBar.style.width = `${progress}%`;
        progressBar.textContent = `${progress}%`;
        message.textContent = data.message || "📋 Обновляю статус...";

        if (data.status === "completed" && data.download_url) {
            progressBar.classList.remove("progress-bar-animated");
            downloadBtn.classList.remove("d-none");
            downloadBtn.href = data.download_url;
        }

        if (data.status === "failed") {
            errorBox.classList.remove("d-none");
            errorBox.textContent = data.message || "❌ ОШИБКА: Не удалось завершить генерацию.";
        } else {
            errorBox.classList.add("d-none");
        }
    } catch (err) {
        errorBox.classList.remove("d-none");
        errorBox.textContent = `❌ ОШИБКА: ${err.message}`;
    }
}

refreshStatus();
setInterval(refreshStatus, 3000);
</script>
</body>
</html>
